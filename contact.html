<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malabaani Travel & Tourism Agency</title>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

    <header>

        <div class="logo">
            <h1>Malabaani Travel & Tourism Agency</h1>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Reservation</a></li>
            </ul>
        </nav>

    </header>

    <section class="adeeg">

        <h2>Booking Form</h2>

        <form method="get">
            <fieldset>
                <legend>Your Info</legend>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" placeholder="Enter your password" minlength="7" required>

            <label>Select Destination</label>

            <select required>
                <option>Mogadishu</option>
                <option>Hargeisa</option>
                <option>Kismayo</option>
                <option>Turkey</option>
                <option>Dubai</option>
            </select>

            <label>Gender</label>

            <input type="radio" name="gender"> Male

            <input type="radio" name="gender"> Female

            <br><br>

            <label>Services</label>

            <input type="checkbox"> Flight Booking

            <input type="checkbox"> Hotel Reservation

            <input type="checkbox"> Tour Package

            <input type="checkbox"> Visa Assistance

            <br><br>

            <label>Travel Date</label>

            <input type="date">

            <label>Your Message</label>

            <textarea placeholder="Write your message..."></textarea>

            <input type="submit" value="Book Now" class="xariif">
            </fieldset>

        </form>

    </section>

    <footer>

        <p>
            © 2026 Malabaani Travel & Tourism Agency | All Rights Reserved.
        </p>

    </footer>

</body>

</html>
